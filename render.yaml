# הגדרות פריסה אוטומטית ל-Render.com (חינמי)
# ראה DEPLOY.md להוראות צעד-אחר-צעד
services:
  - type: web
    name: chart-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # מוגדר ידנית בלוח הבקרה של Render (מפתח חינמי מ-aistudio.google.com/apikey)
