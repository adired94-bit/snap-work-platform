name: Deploy תעבורה PWA to GitHub Pages

# Publishes the traffic-management PWA so it can be installed on
# desktop and mobile. Only the app's own files are deployed — the
# banking "connector" and vendor folders are intentionally excluded.

on:
  push:
    branches:
      - claude/traffic-management-apk-36o58s
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (app files only)
        run: |
          mkdir -p _site
          cp index.html manifest.json sw.js icon.svg _site/
          cp icon-192.png icon-512.png icon-512-maskable.png _site/
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
